# ============================================================
#  Stack completo — Inventario de Almacén (Grupo 10)
# ------------------------------------------------------------
#  Infraestructura:
#    - nats          → broker de mensajería entre microservicios
#    - pg-inventario → PostgreSQL para producto + inventario
#    - pg-reposicion → PostgreSQL para reposicion
#
#  Microservicios:
#    - producto      → HTTP :3000 (CRUD + cliente NATS)
#    - inventario    → Worker NATS (procesa movimientos de stock)
#    - reposicion    → Worker NATS (genera órdenes de reposición)
# ============================================================

services:

  # ── Infraestructura ──────────────────────────────────────────────────────────

  nats:
    image: nats:2.10-alpine
    container_name: nats-broker
    restart: unless-stopped
    ports:
      - "4222:4222"   # Puerto de clientes (lo usan los microservicios)
      - "8222:8222"   # Endpoint HTTP de monitoreo
    command:
      - "-js"
      - "-m"
      - "8222"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  pg-inventario:
    image: postgres:16-alpine
    container_name: pg-inventario
    restart: unless-stopped
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: db_inventario
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - pg_inventario_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d db_inventario"]
      interval: 5s
      timeout: 3s
      retries: 5

  pg-reposicion:
    image: postgres:16-alpine
    container_name: pg-reposicion
    restart: unless-stopped
    ports:
      - "15433:5432"
    environment:
      POSTGRES_DB: db_reposicion
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - pg_reposicion_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d db_reposicion"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Microservicios ───────────────────────────────────────────────────────────

  producto:
    build:
      context: .
      dockerfile: apps/producto/Dockerfile
    container_name: ms-producto
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NATS_URL: nats://nats:4222
      DB_INVENTARIO_HOST: pg-inventario
      DB_INVENTARIO_PORT: 5432
      DB_INVENTARIO_NAME: db_inventario
      DB_INVENTARIO_USER: admin
      DB_INVENTARIO_PASSWORD: admin123
    depends_on:
      nats:
        condition: service_healthy
      pg-inventario:
        condition: service_healthy

  inventario:
    build:
      context: .
      dockerfile: apps/inventario/Dockerfile
    container_name: ms-inventario
    restart: unless-stopped
    environment:
      NATS_URL: nats://nats:4222
      DB_INVENTARIO_HOST: pg-inventario
      DB_INVENTARIO_PORT: 5432
      DB_INVENTARIO_NAME: db_inventario
      DB_INVENTARIO_USER: admin
      DB_INVENTARIO_PASSWORD: admin123
    depends_on:
      nats:
        condition: service_healthy
      pg-inventario:
        condition: service_healthy

  reposicion:
    build:
      context: .
      dockerfile: apps/reposicion/Dockerfile
    container_name: ms-reposicion
    restart: unless-stopped
    environment:
      NATS_URL: nats://nats:4222
      DB_REPOSICION_HOST: pg-reposicion
      DB_REPOSICION_PORT: 5432
      DB_REPOSICION_NAME: db_reposicion
      DB_REPOSICION_USER: admin
      DB_REPOSICION_PASSWORD: admin123
    depends_on:
      nats:
        condition: service_healthy
      pg-reposicion:
        condition: service_healthy

volumes:
  pg_inventario_data:
  pg_reposicion_data:
